services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: financiera
      POSTGRES_PASSWORD: financiera
      POSTGRES_DB: financiera_hogar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financiera -d financiera_hogar"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
